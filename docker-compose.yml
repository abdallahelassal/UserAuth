version: "3.8"

services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}

    depends_on:
      db:
        condition: service_healthy
      
    networks:
      - user-network  
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-userdb}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - user-network  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 30s
      timeout: 10s
      retries: 5    
  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@test.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - user-network
  migration:
    image: migrate/migrate
    depends_on:
      db:
        condition: service_healthy
    networks:
      - user-network
    volumes:
      - ./migrations:/migrations
    entrypoint: ["migrate"]   
    command: ["-path=/migrations", "-database=postgres://postgres:postgres@db:5432/userdb?sslmode=disable", "up"]      



volumes:
  db_data:
networks:
  user-network:
    driver: bridge  


